version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: passajero1900-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: passajero
      POSTGRES_PASSWORD: passajero123
      POSTGRES_DB: passajero_db
    ports:
      - '7492:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U passajero']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - passajero-network

networks:
  passajero-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
